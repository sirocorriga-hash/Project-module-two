{% extends "base.html" %}

{% block content %}

<h3 class="mb-3">
    <i class="bi bi-graph-up"></i> Summary
</h3>

<div class="card shadow-sm border-0 p-3">

    {% for person, balance in balances.items() %}

    <div class="d-flex justify-content-between py-2 border-bottom">

        <div>
            <i class="bi bi-person-circle"></i> {{ person }}
        </div>

        <div class="fw-bold
            {% if balance >= 0 %}text-success{% else %}text-danger{% endif %}">

            €{{ "%.2f"|format(balance) }}

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
