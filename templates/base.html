<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TripSplit</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-airplane"></i> TripSplit
        </a>

        <div class="d-flex gap-2">

            <a class="btn btn-outline-light btn-sm" href="/expenses">
                <i class="bi bi-receipt"></i> Expenses
            </a>

            <a class="btn btn-success btn-sm" href="/add">
                <i class="bi bi-plus-circle"></i> Add Expense
            </a>

            <a class="btn btn-warning btn-sm" href="/summary">
                <i class="bi bi-graph-up"></i> Summary
            </a>

        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container py-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
