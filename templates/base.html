<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TripSplit{% endblock %}</title>

    <!-- Bootstrap 5.3.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light d-flex flex-column h-100">


<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">

      
        <a class="navbar-brand fw-bold" href="/" aria-label="TripSplit Home">
            <i class="bi bi-airplane" aria-hidden="true"></i> TripSplit
        </a>

  
        <div class="d-flex gap-1 gap-sm-2">
            <a class="btn btn-outline-light btn-sm" href="/expenses" aria-label="Expenses">
                <i class="bi bi-receipt"></i> 
                <span class="d-none d-sm-inline">Expenses</span>
            </a>

            <a class="btn btn-success btn-sm" href="/add" aria-label="Add Expense">
                <i class="bi bi-plus-circle"></i> 
                <span class="d-none d-sm-inline">Add Expense</span>
            </a>

            <a class="btn btn-warning btn-sm" href="/summary" aria-label="Summary">
                <i class="bi bi-graph-up"></i> 
                <span class="d-none d-sm-inline">Summary</span>
            </a>
        </div>

    </div>
</nav>


<main class="container py-4 flex-shrink-0">
    {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="bg-dark text-light mt-auto py-4">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">

        <div class="text-center text-md-start">
            <i class="bi bi-airplane" aria-hidden="true"></i>
            <strong>TripSplit</strong> &copy; 2026
        </div>

        <div class="text-muted small text-center">
            Simple and Transparent Trip Expense Management
        </div>

        <div class="d-flex gap-3 justify-content-center">
            <a href="/" class="text-light text-decoration-none opacity-75 link-hover">Home</a>
            <a href="/expenses" class="text-light text-decoration-none opacity-75 link-hover">Expenses</a>
            <a href="/summary" class="text-light text-decoration-none opacity-75 link-hover">Summary</a>
        </div>

    </div>
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
