{% extends "base.html" %}

{% block title %}Home - Splitz{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center my-5">
    <div class="col-md-8 col-lg-6 text-center">
        
       
        <div class="mb-4">
            <i class="bi bi-airplane-engines text-primary display-1 d-block mb-3"></i>
            <h1 class="fw-extrabold display-4">Splitz</h1>
        </div>

    
        <p class="lead text-muted mb-4">
            Split your travel expenses simply and transparently. No stress, just travel.
        </p>

   
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="/add" class="btn btn-success btn-lg px-4 gap-3 shadow-sm">
                <i class="bi bi-plus-circle"></i> Add First Expense
            </a>
            <a href="/expenses" class="btn btn-outline-secondary btn-lg px-4 shadow-sm">
                <i class="bi bi-receipt"></i> View Expenses
            </a>
        </div>

    </div>
</div>
{% endblock %}
